# 本 repo 的治理 CI(dogfood)——帳本位於 docs/<skill>/(非預設 docs/),故跑結構性檢查集
name: governance
on:
  pull_request:
  push:
    branches: [main]
jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: bilingual pairs (ai-sdlc)
        run: python3 skills/ai-sdlc/scripts/bilingual_check.py --skill-dir skills/ai-sdlc
      - name: bilingual pairs (ai-sdlc-autopilot)
        run: python3 skills/ai-sdlc/scripts/bilingual_check.py --skill-dir skills/ai-sdlc-autopilot
      - name: py_compile all scripts
        run: |
          python3 -m py_compile skills/ai-sdlc/scripts/*.py \
            skills/ai-sdlc-autopilot/scripts/*.py \
            skills/intel-analysis/scripts/*.py \
            plugins/ai-sdlc-suite/mcp/*.py \
            plugins/ai-sdlc-suite/hooks/*.py \
            plugins/build_suite.py
      - name: JSON validity
        run: |
          for f in skills/ai-sdlc/assets/*.json skills/ai-sdlc-autopilot/assets/*.json \
                   skills/ai-sdlc/evals/evals.json skills/ai-sdlc-autopilot/evals/evals.json \
                   .claude-plugin/marketplace.json plugins/ai-sdlc-suite/.claude-plugin/plugin.json \
                   plugins/ai-sdlc-suite/.mcp.json docs/*/knowledge/vocabulary.json; do
            python3 -m json.tool "$f" > /dev/null || exit 1
          done
      - name: autopilot plan-check (suite ledger CHGs)
        run: |
          for f in docs/ai-sdlc-autopilot/changes/CHG-*.md docs/ai-sdlc-suite/changes/CHG-*.md docs/intel-analysis/changes/CHG-*.md; do
            python3 skills/ai-sdlc-autopilot/scripts/autopilot_runner.py plan-check --chg "$f" || exit 1
          done
      - name: plugin skills copies in sync
        run: python3 plugins/build_suite.py --check
